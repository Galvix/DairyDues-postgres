# /srv/dairydues/docker-compose.yml
#
# Self-contained DairyDues stack. Everything it needs (data, secrets, uploads)
# lives in this folder, so migrating to new hardware is: rsync -a /srv/dairydues
# to the new host, `docker network create proxy` once, then `docker compose up -d`.
#
# Secrets come from a sibling .env file (gitignored). See .env.example.

services:
  db:
    image: postgres:18-alpine          # pinned tag — updates are deliberate
    container_name: dairydues-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # Bind mount, NOT a named volume — the data lives inside this folder
      # so it copies with the folder. Use `rsync -a` to preserve ownership.
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - internal                       # db is reachable ONLY by the api
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api                       # your FastAPI / dart_frog service
    container_name: dairydues-api
    restart: unless-stopped
    env_file: .env
    environment:
      # The API connects to the db by its service name over the internal network.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      API_TOKEN: ${API_TOKEN}          # app auth (replaces what Firebase gave you)
      PRINT_AGENT_TOKEN: ${PRINT_AGENT_TOKEN}  # separate token for the home printer agent
    volumes:
      # Generated PDF slips persist on the host, surviving container rebuilds.
      - ./data/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy     # wait for Postgres to actually accept connections
    networks:
      - internal                       # to reach the db
      - proxy                          # to be reached by the reverse proxy
    # No published ports: the reverse proxy (separate stack) reaches `api` by
    # name over the shared `proxy` network, and the home print agent polls
    # through that proxy over Tailscale/HTTPS. Uncomment below ONLY for local
    # debugging directly on the Pi:
    # ports:
    #   - "127.0.0.1:8000:8000"

networks:
  internal:
    # Private network for db <-> api only. Not reachable from other stacks.
    driver: bridge

  proxy:
    # Shared with your reverse-proxy stack. Create it once on each machine:
    #   docker network create proxy
    external: true
name: dairy_app
description: Dairy Financial Management App
publish_to: 'none'
version: 1.0.0+1

flutter_launcher_name: DairyDues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend API (self-hosted FastAPI + PostgreSQL)
  dio: ^5.7.0
  flutter_dotenv: ^5.1.0

  # Offline-first: local persistence + client ids + connectivity for auto-sync
  uuid: ^4.5.1
  connectivity_plus: ^6.1.0

  # State management
  provider: ^6.1.2

  # PDF generation
  pdf: ^3.10.8
  printing: ^5.12.0

  # Excel export
  excel: ^4.0.2

  # File saving (mobile/desktop only)
  path_provider: ^2.1.2

  # Date utilities
  intl: ^0.19.0

  # UI
  gap: ^3.0.1
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"